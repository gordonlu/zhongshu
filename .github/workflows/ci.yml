name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - run: rustup component add rustfmt
      - run: cargo fmt --check

  clippy:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - run: rustup component add clippy
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            libdbus-1-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev
      - run: cargo clippy --workspace --all-targets

  check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            libdbus-1-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev
      - run: cargo check --workspace

  test-core:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libdbus-1-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev
      # Authority tests use global singletons (OnceLock) and race in parallel.
      # Run them separately with --test-threads=1 in test-core-auth.
      - run: cargo test -p zhongshu-core -- --skip authority

  test-core-auth:
    runs-on: ubuntu-24.04
    needs: test-core
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libdbus-1-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev
      - run: cargo test -p zhongshu-core -- authority --test-threads=1

  test-orb:
    runs-on: ubuntu-24.04
    env:
      DISPLAY: ":99"
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            libdbus-1-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            xvfb
      - name: Start virtual display
        run: Xvfb :99 -screen 0 1280x720x24 &
      - run: cargo test -p zhongshu-orb

  check-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - run: cargo check -p zhongshu-core
