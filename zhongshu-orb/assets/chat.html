<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0c0c0e;
  --surface:#161618;
  --surface-hover:#1c1c1f;
  --border:#232326;
  --border-light:#2a2a2e;
  --text:#e8e8ed;
  --text-dim:#9d9da3;
  --text-muted:#6b6b73;
  --accent:#3b82f6;
  --accent-hover:#5291f7;
  --accent-soft:rgba(59,130,246,0.1);
  --accent-glow:rgba(59,130,246,0.25);
  --user:#1a1715;
  --user-border:rgba(251,146,60,0.15);
  --user-accent:#f59e0b;
  --success:#22c55e;
  --danger:#d04a1a;
  --shadow:rgba(0,0,0,0.6);
  --radius:10px;
  --radius-sm:6px;
}
body.light{
  --bg:#f7f7f8;
  --surface:#ffffff;
  --surface-hover:#f0f1f3;
  --border:#dedfe3;
  --border-light:#d1d5db;
  --text:#202124;
  --text-dim:#5f6368;
  --text-muted:#8a8f98;
  --accent:#2563eb;
  --accent-hover:#1d4ed8;
  --accent-soft:rgba(37,99,235,0.09);
  --accent-glow:rgba(37,99,235,0.18);
  --user:#fff7ed;
  --user-border:rgba(245,158,11,0.22);
  --user-accent:#b45309;
  --success:#15803d;
  --danger:#b42318;
  --shadow:rgba(15,23,42,0.16);
}
body{background:var(--bg);color:var(--text);font:14px/1.6 -apple-system,BlinkMacSystemFont,system-ui,sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;-webkit-font-smoothing:antialiased;letter-spacing:0.01em}

/* ── Header ── */
#header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 6px;flex-shrink:0;user-select:none;border-bottom:1px solid var(--border);background:var(--bg)}
#header-title{font-size:12px;font-weight:500;color:var(--text-muted);letter-spacing:0.06em;text-transform:uppercase}
#header-model{font-size:11px;color:var(--text-dim);margin-left:8px;font-variant-numeric:tabular-nums}
#header-btns{display:flex;gap:4px}
.icon-btn{width:28px;height:28px;display:inline-flex;align-items:center;justify-content:center;background:transparent;border:1px solid transparent;border-radius:var(--radius-sm);color:var(--text-muted);cursor:pointer;padding:0;transition:all 120ms;opacity:0.78;line-height:1}
.icon-btn svg{width:16px;height:16px;display:block;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.icon-btn:hover,.icon-btn.active{opacity:1;color:var(--text);background:var(--surface-hover);border-color:var(--border)}
#tasks-count{font-size:10px;background:var(--accent);color:#fff;border-radius:8px;padding:0 5px;margin-left:3px;display:none}

/* ── Chat ── */
#chat{flex:1;overflow-y:auto;padding:4px 12px 12px;scroll-behavior:smooth}
#chat::-webkit-scrollbar{width:4px}
#chat::-webkit-scrollbar-track{background:transparent}
#chat::-webkit-scrollbar-thumb{background:var(--border-light);border-radius:2px}
#chat::-webkit-scrollbar-thumb:hover{background:var(--text-muted)}

/* Messages */
.msg{display:flex;margin-bottom:8px}
.msg-user{justify-content:flex-end}
.msg-left{justify-content:flex-start}
.bubble{max-width:80%;padding:8px 12px;border-radius:var(--radius);position:relative;line-height:1.55;transition:opacity .15s}
.bubble-user{background:var(--user);border:1px solid var(--user-border);border-bottom-right-radius:3px}
.bubble-ai{background:var(--surface);border:1px solid var(--border);border-bottom-left-radius:3px}
.bubble-system{background:var(--surface);border:1px solid var(--border);width:100%}
.role-label{font-size:10px;font-weight:600;letter-spacing:0.04em;margin-bottom:3px;display:flex;align-items:center;gap:4px}
.role-label::before{content:'';display:inline-block;width:5px;height:5px;border-radius:50%;flex-shrink:0}
.bubble-user .role-label{color:var(--user-accent);justify-content:flex-end}
.bubble-user .role-label::before{background:var(--user-accent)}
.bubble-ai .role-label{color:var(--accent)}
.bubble-ai .role-label::before{background:var(--accent)}

/* Markdown */
.md{line-height:1.65;word-wrap:break-word;overflow-wrap:break-word;font-size:13px}
.md p{margin:2px 0}
.md h1,.md h2,.md h3{margin:6px 0 2px;font-weight:600;color:var(--text)}
.md h1{font-size:15px}
.md h2{font-size:14px}
.md h3{font-size:13px}
.md pre{background:rgba(0,0,0,0.18);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;margin:6px 0;overflow-x:auto;font:12px/1.5 'SF Mono','JetBrains Mono','Cascadia Code',monospace}
.md code{background:var(--accent-soft);border:none;border-radius:3px;padding:1px 4px;font-size:0.85em;font-family:'SF Mono','JetBrains Mono',monospace;color:#93c5fd}
.md pre code{background:none;padding:0;font-size:12px;color:var(--text)}
.md table{border-collapse:collapse;width:100%;margin:6px 0;font-size:12px;border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden}
.md th{background:var(--surface-hover);border-bottom:1px solid var(--border);padding:6px 10px;text-align:left;font-size:10px;font-weight:600;color:var(--text-muted);letter-spacing:0.03em;text-transform:uppercase}
.md td{border-bottom:1px solid var(--border);padding:5px 10px;color:var(--text)}
.md tr:last-child td{border-bottom:none}
.md blockquote{border-left:2px solid var(--accent);margin:6px 0;padding:4px 12px;background:var(--accent-soft);border-radius:0 var(--radius-sm) var(--radius-sm) 0;color:var(--text-dim)}
.md ul,.md ol{padding-left:18px;margin:4px 0}
.md li{margin:1px 0}
.md a{color:#93c5fd;text-decoration:none}
.md a:hover{text-decoration:underline}
.md hr{border:none;border-top:1px solid var(--border);margin:10px 0}
.md img{max-width:100%;border-radius:var(--radius-sm);margin:4px 0}

/* Tool calls */
.tools{margin:2px 0 6px;font-size:11px}
.tool-item{display:inline-flex;align-items:center;gap:3px;margin-right:5px;padding:1px 6px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:4px;color:var(--text-muted)}
.tool-done{color:var(--success)}
.tool-count{font-size:10px;color:var(--text-muted);margin-left:1px}
.tool-sep{height:1px;background:var(--border);margin:6px 0 8px}

/* Thinking spinner */
.thinking{display:flex;align-items:center;gap:6px;color:var(--text-muted);font-size:12px;padding:2px 0}
.spinner{width:12px;height:12px;border:1.5px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* Input */
#input-area{display:flex;gap:6px;padding:8px 12px 12px;background:var(--bg);border-top:1px solid var(--border);flex-shrink:0;min-height:57px}
#input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px;color:var(--text);font:13.5px/1.5 -apple-system,sans-serif;resize:none;outline:none;min-height:36px;max-height:90px;transition:border-color 120ms,box-shadow 120ms}
#input:focus{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent-soft)}
#input::placeholder{color:var(--text-muted)}
#send{background:var(--accent);border:none;border-radius:var(--radius);padding:7px 14px;color:#fff;font-weight:500;cursor:pointer;white-space:nowrap;transition:all 120ms;font-size:12.5px}
#send:hover{background:var(--accent-hover)}
#send:active{transform:scale(0.97)}
#stop{display:none;color:var(--danger);border-color:rgba(208,74,26,0.28);align-self:flex-start;margin-top:4px}
#stop.active{display:inline-flex}

/* Auth */
#auth-overlay{display:none;position:sticky;bottom:0;width:100%;background:rgba(30,30,36,0.96);border-top:1px solid #333;padding:12px 16px;z-index:100;backdrop-filter:blur(4px)}
#auth-overlay.active{display:block}
#auth-card h3{margin:0 0 6px 0;font-size:13px;color:#e8e8e8}
#auth-card p{margin:2px 0;font-size:12px;color:#999;word-break:break-all}
#auth-btns{display:flex;gap:8px;margin-top:8px}
#auth-btns button{padding:6px 16px;border:none;border-radius:4px;cursor:pointer;font-size:12px}
#auth-approve{background:#4caf50;color:#fff}
#auth-deny{background:#666;color:#fff}
#auth-card{background:var(--surface);border:1px solid var(--border-light);border-radius:12px;padding:20px;max-width:380px;width:90%;box-shadow:0 16px 48px var(--shadow)}
#auth-card h3{font-size:13.5px;font-weight:600;color:var(--text);margin-bottom:6px}
#auth-card p{margin:2px 0;color:var(--text-dim);font-size:12.5px;word-break:break-all}
#auth-btns{display:flex;gap:6px;margin-top:14px}
#auth-approve{flex:1;background:var(--accent);border:none;border-radius:var(--radius-sm);padding:8px;color:#fff;font-weight:500;cursor:pointer;transition:all 120ms}
#auth-approve:hover{background:var(--accent-hover)}
#auth-deny{flex:1;background:transparent;border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px;color:var(--text-dim);cursor:pointer;transition:all 120ms}
#auth-deny:hover{background:var(--surface-hover);color:var(--text)}

/* Tasks */
#tasks-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:1000;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
#tasks-overlay.active{display:flex}
#tasks-card{background:var(--surface);border:1px solid var(--border-light);border-radius:12px;padding:20px;max-width:400px;width:90%;max-height:70vh;overflow-y:auto;box-shadow:0 16px 48px var(--shadow)}
#tasks-list{display:flex;flex-direction:column;gap:6px}
.task-item{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:12.5px}
.task-item .task-title{color:var(--text);flex:1;word-break:break-word}
.task-item .task-status{font-size:10px;padding:2px 6px;border-radius:4px;margin-left:8px;flex-shrink:0}
.task-item .task-actions{display:flex;gap:4px;margin-left:8px;flex-shrink:0}
.task-btn{background:transparent;border:none;border-radius:3px;cursor:pointer;font-size:11px;padding:2px 5px;transition:all 120ms;color:var(--text-muted)}
.task-btn:hover{background:var(--surface-hover);color:var(--text)}
.task-btn-done{color:var(--success)}
.task-btn-done:hover{background:rgba(34,197,94,0.1);color:var(--success)}
.task-btn-cancel{color:var(--danger)}
.task-btn-cancel:hover{background:rgba(208,74,26,0.1);color:var(--danger)}
.task-status-pending{background:rgba(59,130,246,0.15);color:#93c5fd}
.task-status-planning{background:rgba(251,146,60,0.15);color:#fcd34d}
.task-status-running{background:rgba(34,197,94,0.15);color:#86efac}
.task-status-waiting_approval{background:rgba(251,146,60,0.15);color:#fcd34d}
.task-empty{color:var(--text-muted);font-size:13px;text-align:center;padding:20px 0}

/* Settings */
#settings-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:1000;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
#settings-overlay.active{display:flex}
#settings-card{background:var(--surface);border:1px solid var(--border-light);border-radius:12px;padding:24px;max-width:420px;width:90%;max-height:85vh;overflow-y:auto;box-shadow:0 16px 48px var(--shadow)}
#settings-card h3{font-size:14px;font-weight:600}
#settings-card label{display:block;font-size:11.5px;color:var(--text-muted);margin-top:12px;margin-bottom:3px;letter-spacing:0.03em}
#settings-card input,#settings-card select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 10px;color:var(--text);font:13px -apple-system,sans-serif;outline:none;transition:border-color 120ms}
#settings-card select option{background:var(--bg);color:var(--text);padding:5px 8px}
#settings-card select option:checked{background:var(--accent-soft);color:var(--text)}
#settings-card input:focus,#settings-card select:focus{border-color:var(--accent)}
#settings-card input[type=number]::-webkit-outer-spin-button,
#settings-card input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
#settings-card input[type=number]{-moz-appearance:textfield;appearance:textfield}
#set-context-size::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent);cursor:pointer;border:none;transition:transform 120ms}
#set-context-size::-webkit-slider-thumb:hover{transform:scale(1.15)}
#set-context-size::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:var(--accent);cursor:pointer;border:none}
#settings-card input[type=checkbox]{width:15px;height:15px;accent-color:var(--accent);cursor:pointer}
#settings-save{width:100%;background:var(--accent);border:none;border-radius:var(--radius-sm);padding:9px;color:#fff;font-weight:500;cursor:pointer;margin-top:14px;transition:all 120ms;font-size:12.5px}
#settings-save:hover{background:var(--accent-hover)}
#settings-close{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:18px;padding:0 3px;line-height:1;opacity:0.6;transition:opacity 120ms}
#settings-close:hover{opacity:1}

/* Confirm */
#confirm-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:1000;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
#confirm-overlay.active{display:flex}
#confirm-card{background:var(--surface);border:1px solid var(--border-light);border-radius:12px;padding:20px;max-width:360px;width:90%;box-shadow:0 16px 48px var(--shadow)}
#confirm-text{margin-bottom:14px;color:var(--text);font-size:13px;line-height:1.5}
#confirm-ok{flex:1;background:var(--accent);border:none;border-radius:var(--radius-sm);padding:8px;color:#fff;cursor:pointer;font-weight:500;font-size:12.5px;transition:all 120ms}
#confirm-ok:hover{background:var(--accent-hover)}
#confirm-cancel{flex:1;background:transparent;border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px;color:var(--text-dim);cursor:pointer;font-size:12.5px;transition:all 120ms}
#confirm-cancel:hover{background:var(--surface-hover);color:var(--text)}
#toast{display:none;position:fixed;bottom:64px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 14px;font-size:12px;color:var(--text-dim);z-index:2000;white-space:nowrap;box-shadow:0 8px 32px var(--shadow)}
#toast.show{display:block}
</style>
</head>
<body>

<div id="header">
  <span id="header-title">中书</span>
  <span id="header-model" class="header-model"></span>
  <div id="header-btns">
    <button id="btn-theme" class="icon-btn" title="切换主题" aria-label="切换主题">
      <svg viewBox="0 0 24 24"><path d="M12 3a9 9 0 1 0 9 9 7 7 0 0 1-9-9Z"/></svg>
    </button>
    <button id="btn-zoom" class="icon-btn" title="2X 放大" aria-label="2X 放大">
      <svg viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M16 3h3a2 2 0 0 1 2 2v3"/><path d="M8 21H5a2 2 0 0 1-2-2v-3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></svg>
    </button>
    <button id="btn-tasks" class="icon-btn" title="任务" aria-label="任务">
      <svg viewBox="0 0 24 24"><path d="M9 6h11"/><path d="M9 12h11"/><path d="M9 18h11"/><path d="M4 6h.01"/><path d="M4 12h.01"/><path d="M4 18h.01"/></svg><span id="tasks-count"></span>
    </button>
    <button id="btn-settings" class="icon-btn" title="设置" aria-label="设置">
      <svg viewBox="0 0 24 24"><path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.6v.3a2 2 0 1 1-4 0V21a1.7 1.7 0 0 0-1-1.6 1.7 1.7 0 0 0-1.9.3l-.1.1A2 2 0 1 1 4.2 17l.1-.1a1.7 1.7 0 0 0 .3-1.9 1.7 1.7 0 0 0-1.6-1H3a2 2 0 1 1 0-4h.3a1.7 1.7 0 0 0 1.6-1 1.7 1.7 0 0 0-.3-1.9L4.5 7A2 2 0 1 1 7.3 4.2l.1.1a1.7 1.7 0 0 0 1.9.3 1.7 1.7 0 0 0 1-1.6V3a2 2 0 1 1 4 0v.3a1.7 1.7 0 0 0 1 1.6 1.7 1.7 0 0 0 1.9-.3l.1-.1A2 2 0 1 1 20.1 7l-.1.1a1.7 1.7 0 0 0-.3 1.9 1.7 1.7 0 0 0 1.6 1h.3a2 2 0 1 1 0 4h-.3a1.7 1.7 0 0 0-1.6 1Z"/></svg>
    </button>
  </div>
</div>

<div id="chat"></div>

<div id="input-area">
  <textarea id="input" placeholder="输入消息..." rows="1"></textarea>
  <button id="stop" class="icon-btn" title="停止生成" aria-label="停止生成">
    <svg viewBox="0 0 24 24"><rect x="7" y="7" width="10" height="10" rx="1"/></svg>
  </button>
  <button id="send">发送</button>
</div>

<div id="auth-overlay">
  <div id="auth-card">
    <h3>需要授权</h3>
    <p id="auth-source"></p>
    <p id="auth-tool"></p>
    <p id="auth-command"></p>
    <div id="auth-btns">
      <button id="auth-approve">同意</button>
      <button id="auth-deny">拒绝</button>
    </div>
  </div>
</div>

<div id="tasks-overlay">
  <div id="tasks-card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <h3 style="margin:0;font-size:14px;font-weight:600">待办任务</h3>
      <button id="tasks-close" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:18px;padding:0 3px;line-height:1;opacity:0.6">✕</button>
    </div>
    <div id="tasks-list"></div>
  </div>
</div>

<div id="settings-overlay">
  <div id="settings-card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h3 style="margin:0">设置</h3>
      <button id="settings-close" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:20px;padding:0 4px;line-height:1">✕</button>
    </div>
    <label>API Key</label>
    <input id="set-api-key" type="password" placeholder="留空则保持已保存的 Key">
    <label>API 地址</label>
    <input id="set-api-base" placeholder="https://api.deepseek.com">
    <label>模型</label>
    <input id="set-model" placeholder="deepseek-chat">
    <label>代理端口</label>
    <input id="set-proxy-port" type="number" placeholder="8081">
    <label>个性风格</label>
    <div style="position:relative">
      <select id="set-personality" style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 11px;color:var(--text);font:13px -apple-system,sans-serif;outline:none;appearance:none;-webkit-appearance:none;cursor:pointer;padding-right:28px">
        <option value="古典">古典 · 精炼幕僚</option>
        <option value="极客">极客 · 技术直白</option>
        <option value="温度">温度 · 友好同事</option>
        <option value="默认">默认</option>
      </select>
      <span style="position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--text-muted);pointer-events:none;font-size:10px">▼</span>
    </div>
    <div style="margin-top:12px">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:var(--text);letter-spacing:0">
        <input id="set-bg-enabled" type="checkbox" style="width:auto"> 启用后台定时检查
      </label>
    </div>
    <label>检查间隔（秒）</label>
    <input id="set-bg-interval" type="number" placeholder="600">
    <label>检查提示词</label>
    <textarea id="set-bg-prompt" rows="2" style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 11px;color:var(--text);font:13px system-ui,sans-serif;outline:none;resize:vertical;transition:border-color 120ms">[定时检查] 使用 system_info 工具收集系统信息并检查异常</textarea>
    <label>上下文窗口</label>
    <div style="display:flex;align-items:center;gap:10px;margin-top:4px">
      <input id="set-context-size" type="range" min="500000" max="1000000" step="100000" value="500000"
        style="flex:1;height:4px;border-radius:2px;background:var(--border);outline:none;-webkit-appearance:none;appearance:none;cursor:pointer;accent-color:var(--accent)">
      <span id="ctx-size-label" style="font-size:13px;color:var(--text);min-width:52px;text-align:right;font-variant-numeric:tabular-nums">500k</span>
    </div>
    <span style="font-size:11px;color:var(--text-muted);display:block;margin-top:4px;line-height:1.4">
      ⚠ 上下文越大，信息越完整，但代价也越高：<br>
      · 每轮对话都携带全部历史，token 消耗随轮数线性增长<br>
      · 达到上限的 80% 时自动触发压缩，丢弃早期对话<br>
      · 1M 适合需要长期上下文的深度工作流，日常 500k 更经济
    </span>
    <div style="margin-top:8px">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:var(--text);letter-spacing:0">
        <input id="set-auto-evolve" type="checkbox" style="width:auto"> 自我进化装备
      </label>
      <span style="font-size:11px;color:var(--text-muted);display:block;margin-top:4px;line-height:1.4">根据中书内部使用模式，自动提议并安装可复用的 skill 装备</span>
    </div>
    <button id="settings-save">保存</button>
    <hr style="border:none;border-top:1px solid var(--border);margin:16px 0">
    <button id="settings-delete" style="width:100%;background:rgba(208,74,26,0.1);border:1px solid rgba(208,74,26,0.2);border-radius:8px;padding:10px;color:#d04a1a;font-weight:500;cursor:pointer;transition:background 120ms;font-size:13px">删除历史对话记录</button>
  </div>
</div>

<div id="toast"></div>

<!-- Confirm dialog -->
<div id="confirm-overlay">
  <div id="confirm-card">
    <p id="confirm-text" style="margin-bottom:16px;color:var(--text);font-size:13.5px;line-height:1.5"></p>
    <div style="display:flex;gap:8px">
      <button id="confirm-cancel" style="flex:1;background:transparent;border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px;color:var(--text-dim);cursor:pointer;font-size:13px">取消</button>
      <button id="confirm-ok" style="flex:1;background:var(--accent);border:none;border-radius:var(--radius-sm);padding:9px;color:#fff;cursor:pointer;font-weight:500;font-size:13px">确认</button>
    </div>
  </div>
</div>

<script>
// ── Simple Markdown Renderer ──
function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function renderMarkdown(text) {
  let html = '';
  let lines = text.split('\n');
  let i = 0;
  let inCode = false;
  let codeLang = '';
  let codeLines = [];

  while (i < lines.length) {
    let line = lines[i];

    // Code block
    if (line.trimStart().startsWith('```')) {
      if (inCode) {
        html += '<pre><code>' + escapeHtml(codeLines.join('\n')) + '</code></pre>\n';
        codeLines = [];
        inCode = false;
      } else {
        inCode = true;
        codeLang = line.trimStart().slice(3).trim();
      }
      i++;
      continue;
    }
    if (inCode) {
      codeLines.push(line);
      i++;
      continue;
    }

    // Table
    if (line.trimStart().startsWith('|') && i + 1 < lines.length && lines[i+1].trimStart().startsWith('|') && /^[\s|:-]+$/.test(lines[i+1].trim())) {
      let tableHtml = '<table><thead><tr>';
      let headers = line.split('|').filter(h => h.trim());
      for (let h of headers) tableHtml += '<th>' + renderInline(h.trim()) + '</th>';
      tableHtml += '</tr></thead><tbody>';
      i += 2;
      while (i < lines.length && lines[i].trimStart().startsWith('|')) {
        let cells = lines[i].split('|').filter(c => c.trim());
        tableHtml += '<tr>';
        for (let c of cells) tableHtml += '<td>' + renderInline(c.trim()) + '</td>';
        tableHtml += '</tr>';
        i++;
      }
      tableHtml += '</tbody></table>\n';
      html += tableHtml;
      continue;
    }

    // Thematic break
    if (/^(-{3,}|\*{3,}|_{3,})\s*$/.test(line)) {
      html += '<hr>\n';
      i++;
      continue;
    }

    // Blockquote
    if (line.trimStart().startsWith('> ')) {
      let quoteLines = [];
      while (i < lines.length && lines[i].trimStart().startsWith('> ')) {
        quoteLines.push(lines[i].trimStart().slice(2));
        i++;
      }
      html += '<blockquote>' + renderInline(quoteLines.join('<br>')) + '</blockquote>\n';
      continue;
    }

    if (line.trim() === '') { i++; continue; }

    // Heading
    let hMatch = line.match(/^(#{1,6})\s+(.+)$/);
    if (hMatch) {
      html += '<h' + hMatch[1].length + '>' + renderInline(hMatch[2]) + '</h' + hMatch[1].length + '>\n';
      i++;
      continue;
    }

    // Unordered list
    if (/^(\s*)[-*+]\s/.test(line)) {
      html += '<ul>\n';
      while (i < lines.length && /^(\s*)[-*+]\s/.test(lines[i])) {
        html += '<li>' + renderInline(lines[i].replace(/^(\s*)[-*+]\s/,'')) + '</li>\n';
        i++;
      }
      html += '</ul>\n';
      continue;
    }

    // Ordered list
    if (/^\s*\d+\.\s/.test(line)) {
      html += '<ol>\n';
      while (i < lines.length && /^\s*\d+\.\s/.test(lines[i])) {
        html += '<li>' + renderInline(lines[i].replace(/^\s*\d+\.\s/,'')) + '</li>\n';
        i++;
      }
      html += '</ol>\n';
      continue;
    }

    // Paragraph
    html += '<p>' + renderInline(line) + '</p>\n';
    i++;
  }

  if (inCode) {
    html += '<pre><code>' + escapeHtml(codeLines.join('\n')) + '</code></pre>\n';
  }

  return html;
}

function renderInline(text) {
  let s = escapeHtml(text);
  s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
  s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
  s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">');
  return s;
}

// ── Chat Logic ──
let messages = [];
let messageNodes = new Map();
let streamingId = null;
let streamingBuffer = '';
let has_more = false;
let loading_more = false;
let currentAuthRequestId = '';

function applyTheme(theme) {
  let light = theme === 'light';
  document.body.classList.toggle('light', light);
  document.getElementById('btn-theme')?.classList.toggle('active', light);
  try { localStorage.setItem('zhongshu-theme', theme); } catch(e) {}
}

function initTheme() {
  let saved = '';
  try { saved = localStorage.getItem('zhongshu-theme') || ''; } catch(e) {}
  if (!saved) saved = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
  applyTheme(saved);
}

function addMessage(role, content, toolCalls) {
  let id = 'msg-' + Date.now() + '-' + Math.random().toString(36).slice(2,6);
  let msg = {id, role, content, toolCalls: toolCalls || []};
  messages.push(msg);
  appendMessage(msg);
  scrollBottom();
  return id;
}

function scrollBottom() {
  let chat = document.getElementById('chat');
  chat.scrollTop = chat.scrollHeight;
}

function scrollTop(prevScrollHeight, prevScrollTop) {
  let chat = document.getElementById('chat');
  chat.scrollTop = chat.scrollHeight - prevScrollHeight + prevScrollTop;
}

function setBusy(busy) {
  document.getElementById('stop').classList.toggle('active', busy);
  document.getElementById('send').disabled = busy;
  document.getElementById('send').style.opacity = busy ? '0.55' : '1';
}

function buildToolBadges(toolCalls) {
  let frag = document.createDocumentFragment();
  if (!toolCalls || toolCalls.length === 0) return frag;
  let tools = document.createElement('div');
  tools.className = 'tools';
  for (let tc of toolCalls) {
    let item = document.createElement('span');
    item.className = 'tool-item';
    item.innerHTML = '<span class="tool-done">✓</span> ' + escapeHtml(tc.name) + (tc.count > 1 ? ' <span class="tool-count">×' + tc.count + '</span>' : '');
    tools.appendChild(item);
  }
  frag.appendChild(tools);
  let sep = document.createElement('div');
  sep.className = 'tool-sep';
  frag.appendChild(sep);
  return frag;
}

function buildMessageNode(m) {
  let div = document.createElement('div');
  let cssRole = m.role === 'assistant' ? 'ai' : m.role;
  div.className = 'msg msg-' + (m.role === 'user' ? 'user' : 'left');
  div.id = m.id;

  let bubble = document.createElement('div');
  bubble.className = 'bubble bubble-' + cssRole;

  let roleLabel = document.createElement('div');
  roleLabel.className = 'role-label';
  roleLabel.textContent = m.role === 'user' ? '你' : '中书';
  bubble.appendChild(roleLabel);

  if (m.toolCalls && m.toolCalls.length > 0) {
    bubble.appendChild(buildToolBadges(m.toolCalls));
  }

  let content = document.createElement('div');
  content.className = 'md';
  if (m._thinking) {
    content.innerHTML = '<span class="thinking"><span class="spinner"></span>思考中...</span>';
  } else if (m.role === 'user') {
    content.textContent = m.content;
  } else {
    let display = m.content;
    let match = m.content.match(/^\[工具: (.+?)\]\n\n/);
    if (match) {
      display = m.content.slice(match[0].length);
      let tools = document.createElement('div');
      tools.className = 'tools';
      for (let token of match[1].split(' · ')) {
        let name = token.replace(/^✓ /, '').replace(/ ×\d+$/, '');
        let count = token.match(/×(\d+)/);
        let item = document.createElement('span');
        item.className = 'tool-item';
        item.innerHTML = '<span class="tool-done">✓</span> ' + escapeHtml(name) + (count ? ' ×' + count[1] : '');
        tools.appendChild(item);
      }
      bubble.appendChild(tools);
      let sep = document.createElement('div');
      sep.className = 'tool-sep';
      bubble.appendChild(sep);
    }
    content.innerHTML = renderMarkdown(display);
  }
  bubble.appendChild(content);
  div.appendChild(bubble);
  return div;
}

function appendMessage(m) {
  let node = buildMessageNode(m);
  document.getElementById('chat').appendChild(node);
  messageNodes.set(m.id, node);
}

function updateMessage(id) {
  let index = messages.findIndex(m => m.id === id);
  if (index < 0) return;
  let oldNode = messageNodes.get(id);
  let newNode = buildMessageNode(messages[index]);
  if (oldNode && oldNode.parentNode) {
    oldNode.replaceWith(newNode);
  } else {
    document.getElementById('chat').appendChild(newNode);
  }
  messageNodes.set(id, newNode);
}

function render() {
  let chat = document.getElementById('chat');
  chat.innerHTML = '';
  messageNodes.clear();
  for (let m of messages) appendMessage(m);
}

// Throttle renders to at most every 50ms during streaming.
let renderPending = false;
let renderTimer = null;
function cancelPendingRender() {
  if (renderTimer) clearTimeout(renderTimer);
  renderPending = false;
}
function scheduleRender() {
  if (renderPending) return;
  renderPending = true;
  if (renderTimer) clearTimeout(renderTimer);
  renderTimer = setTimeout(() => {
    renderPending = false;
    if (streamingId) updateMessage(streamingId);
    else render();
    scrollBottom();
  }, 50);
}

// ── IPC: Receive from Rust ──
function handleIpc(message) {
  try {
    let msg = typeof message === 'string' ? JSON.parse(message) : message;
    switch (msg.type) {
      case 'state_change':
        if (msg.state === 'thinking' && !streamingId) {
          setBusy(true);
          streamingId = 'stream-' + Date.now();
          streamingBuffer = '';
          messages.push({id: streamingId, role: 'assistant', content: '', toolCalls: [], _thinking: true});
          scheduleRender();
        } else if (msg.state === 'thinking') {
          setBusy(true);
        } else if (msg.state === 'stopped') {
          if (streamingId) {
            let cm = messages.find(m => m.id === streamingId);
            if (cm) {
              cm._thinking = false;
              cm.content = streamingBuffer ? streamingBuffer + '\n\n[已停止]' : '[已停止]';
              updateMessage(streamingId);
            }
            streamingId = null;
            streamingBuffer = '';
          }
          setBusy(false);
        } else if (msg.state === 'idle' || msg.state === 'done') {
          setBusy(false);
        }
        break;

      case 'delta':
        if (!streamingId) {
          streamingId = 'stream-' + Date.now();
          streamingBuffer = '';
          messages.push({id: streamingId, role: 'assistant', content: '', toolCalls: [], _thinking: true});
        }
        streamingBuffer += msg.content;
        let sm = messages.find(m => m.id === streamingId);
        if (sm) {
          sm._thinking = false;
          sm.content = streamingBuffer;
          scheduleRender();
        }
        break;

      case 'complete':
        if (streamingId) {
          let cm = messages.find(m => m.id === streamingId);
          if (cm) {
            cm._thinking = false;
            cm.content = streamingBuffer;
          }
          streamingId = null;
          streamingBuffer = '';
          setBusy(false);
          scheduleRender();
        }
        break;

      case 'history':
        cancelPendingRender();
        messages = [];
        messageNodes.clear();
        streamingId = null;
        setBusy(false);
        has_more = msg.has_more || false;
        for (let e of msg.entries) {
          let role = typeof e.role === 'string' ? e.role.toLowerCase() : 'assistant';
          messages.push({
            id: 'hist-' + Date.now() + '-' + Math.random().toString(36).slice(2,6),
            role: role,
            content: e.content,
            toolCalls: e.tool_calls || [],
          });
        }
        render();
        scrollBottom();
        break;

      case 'prepend_history':
        cancelPendingRender();
        {
          let chat = document.getElementById('chat');
          let prevScrollHeight = chat.scrollHeight;
          let prevScrollTop = chat.scrollTop;
          let prepend = [];
          for (let e of msg.entries) {
            let role = typeof e.role === 'string' ? e.role.toLowerCase() : 'assistant';
            prepend.push({
              id: 'hist-' + Date.now() + '-' + Math.random().toString(36).slice(2,6),
              role: role,
              content: e.content,
              toolCalls: e.tool_calls || [],
            });
          }
          messages = prepend.concat(messages);
          has_more = msg.has_more || false;
          loading_more = false;
          render();
          scrollTop(prevScrollHeight, prevScrollTop);
        }
        break;

      case 'auth':
        currentAuthRequestId = msg.request.request_id || '';
        document.getElementById('auth-source').textContent = '来源：' + (msg.request.source || '');
        document.getElementById('auth-tool').textContent = '工具：' + (msg.request.tool || '');
        document.getElementById('auth-command').textContent = '指令：' + (msg.request.command || '');
        document.getElementById('auth-overlay').classList.add('active');
        break;

      case 'tasks':
        renderTasks(msg.tasks);
        document.getElementById('tasks-overlay').classList.add('active');
        break;

      case 'settings':
        document.getElementById('set-api-key').value = msg.config.api_key || '';
        document.getElementById('set-api-key').placeholder = msg.config.api_key_saved ? '已保存；留空不变' : 'sk-...';
        document.getElementById('set-api-base').value = msg.config.api_base || '';
        document.getElementById('set-model').value = msg.config.model || '';
        document.getElementById('set-personality').value = msg.config.personality || '默认';
        document.getElementById('set-proxy-port').value = msg.config.proxy_port || '8081';
        document.getElementById('set-bg-enabled').checked = msg.config.bg_enabled || false;
        document.getElementById('set-bg-interval').value = msg.config.bg_interval || '600';
        document.getElementById('set-bg-prompt').value = msg.config.bg_prompt || '';
        document.getElementById('set-context-size').value = String(msg.config.max_context_tokens || 500000);
        updateCtxSizeLabel();
        document.getElementById('set-auto-evolve').checked = msg.config.auto_evolve || false;
        document.getElementById('settings-overlay').classList.add('active');
        break;

      case 'clear':
        cancelPendingRender();
        messages = [];
        messageNodes.clear();
        streamingId = null;
        streamingBuffer = '';
        setBusy(false);
        render();
        break;

      case 'tool_call':
        if (streamingId) {
          let sm = messages.find(m => m.id === streamingId);
          if (sm) {
            if (!sm.toolCalls) sm.toolCalls = [];
            let last = sm.toolCalls[sm.toolCalls.length - 1];
            if (last && last.name === msg.name) {
              last.count = (last.count || 1) + 1;
            } else {
              sm.toolCalls.push({name: msg.name, count: 1});
            }
            updateMessage(streamingId);
          }
        }
        break;
      case 'model':
        document.getElementById('header-model').textContent = msg.label || '';
        break;
      case 'toast':
        showToast(msg.text);
        break;
      case 'zoom':
        document.getElementById('btn-zoom').classList.toggle('active', !!msg.active);
        break;
    }
  } catch(e) {
    console.error('IPC error:', e);
  }
}

function updateCtxSizeLabel() {
  var s = document.getElementById('set-context-size');
  var v = parseInt(s.value) / 1000;
  document.getElementById('ctx-size-label').textContent = (v >= 1000 ? '1M' : v + 'k');
}

function showToast(text) {
  let t = document.getElementById('toast');
  t.textContent = text;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function showConfirm(text, callback) {
  document.getElementById('confirm-text').textContent = text;
  document.getElementById('confirm-overlay').classList.add('active');
  document.getElementById('confirm-ok').onclick = function() {
    document.getElementById('confirm-overlay').classList.remove('active');
    callback();
  };
  document.getElementById('confirm-cancel').onclick = function() {
    document.getElementById('confirm-overlay').classList.remove('active');
  };
}

// ── IPC: Send to Rust ──
function sendIpc(msg) {
  try {
    if (window.__TAURI__) {
      window.__TAURI__.invoke('handle_ipc', {msg: JSON.stringify(msg)});
    } else if (window.ipc && window.ipc.postMessage) {
      window.ipc.postMessage(JSON.stringify(msg));
    } else {
      console.log('IPC send:', msg);
    }
  } catch(e) {
    console.error('IPC send error:', e);
  }
}

// ── Helpers ──
function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Task panel ──
function renderTasks(tasks) {
  var el = document.getElementById('tasks-list');
  if (!tasks || tasks.length === 0) {
    el.innerHTML = '<div class="task-empty">暂无待办任务</div>';
    return;
  }
    var html = '';
    for (var i = 0; i < tasks.length; i++) {
      var t = tasks[i];
      var statusClass = 'task-status-' + t.status;
      var statusLabel = {pending:'待处理',planning:'规划中',running:'执行中',waiting_approval:'待授权'}[t.status] || t.status;
      var actions = '';
      if (t.status === 'pending' || t.status === 'planning' || t.status === 'waiting_approval') {
        actions = '<div class="task-actions"><button class="task-btn task-btn-cancel" onclick="cancelTask(\'' + t.id + '\')">✕</button></div>';
      } else if (t.status === 'running') {
        actions = '<div class="task-actions"><button class="task-btn task-btn-done" onclick="completeTask(\'' + t.id + '\')">✓</button><button class="task-btn task-btn-cancel" onclick="cancelTask(\'' + t.id + '\')">✕</button></div>';
      }
      html += '<div class="task-item"><span class="task-title">' + escapeHtml(t.title) + '</span><span class="task-status ' + statusClass + '">' + statusLabel + '</span>' + actions + '</div>';
    }
  el.innerHTML = html;
  // Update count badge
  var badge = document.getElementById('tasks-count');
  if (tasks.length > 0) {
    badge.textContent = tasks.length;
    badge.style.display = 'inline';
  } else {
    badge.style.display = 'none';
  }
}

function cancelTask(id) {
  sendIpc({type: 'cancel_task', task_id: id});
}
function completeTask(id) {
  // Complete via IPC — main.rs will handle it
  sendIpc({type: 'complete_task', task_id: id});
}

document.getElementById('btn-tasks').addEventListener('click', function() {
  sendIpc({type: 'list_tasks'});
});
document.getElementById('tasks-close').addEventListener('click', function() {
  document.getElementById('tasks-overlay').classList.remove('active');
});

// ── UI Events ──
document.getElementById('send').addEventListener('click', sendMessage);
document.getElementById('stop').addEventListener('click', function() {
  sendIpc({type: 'stop'});
});
document.getElementById('btn-theme').addEventListener('click', function() {
  applyTheme(document.body.classList.contains('light') ? 'dark' : 'light');
});
document.getElementById('btn-zoom').addEventListener('click', function() {
  sendIpc({type: 'toggle_zoom'});
});
document.getElementById('btn-settings').addEventListener('click', function() {
  sendIpc({type: 'open_settings'});
});
document.getElementById('settings-close').addEventListener('click', function() {
  document.getElementById('settings-overlay').classList.remove('active');
});
document.getElementById('set-context-size').addEventListener('input', updateCtxSizeLabel);
document.getElementById('input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

function sendMessage() {
  let input = document.getElementById('input');
  let text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';
  addMessage('user', text);
  sendIpc({type: 'submit', text});
}

// Auth buttons
document.getElementById('auth-approve').addEventListener('click', function() {
  document.getElementById('auth-overlay').classList.remove('active');
  sendIpc({type: 'approve', request_id: currentAuthRequestId});
});
document.getElementById('auth-deny').addEventListener('click', function() {
  document.getElementById('auth-overlay').classList.remove('active');
  sendIpc({type: 'deny', request_id: currentAuthRequestId});
});

// Settings
document.getElementById('settings-save').addEventListener('click', function() {
  sendIpc({type: 'save_settings', config: {
    api_key: document.getElementById('set-api-key').value,
    api_base: document.getElementById('set-api-base').value,
    model: document.getElementById('set-model').value,
    personality: document.getElementById('set-personality').value,
    proxy_port: document.getElementById('set-proxy-port').value,
    bg_enabled: document.getElementById('set-bg-enabled').checked,
    bg_interval: document.getElementById('set-bg-interval').value,
    bg_prompt: document.getElementById('set-bg-prompt').value,
    auto_evolve: document.getElementById('set-auto-evolve').checked,
    max_context_tokens: parseInt(document.getElementById('set-context-size').value) || 500000,
  }});
  document.getElementById('settings-overlay').classList.remove('active');
});

document.getElementById('settings-delete').addEventListener('click', function() {
  showConfirm('确认删除所有历史对话记录？此操作不可撤销。', function() {
    sendIpc({type: 'delete_history'});
    document.getElementById('settings-overlay').classList.remove('active');
  });
});

// Auto resize input
document.getElementById('input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 90) + 'px';
});

// ── Expose for wry IPC ──
window.handleIpc = handleIpc;

initTheme();

// Signal ready
sendIpc({type: 'ready'});

// ── Disable right-click context menu ──
document.addEventListener('contextmenu', function(e) { e.preventDefault(); });

// ── Lazy load older history on scroll to top ──
document.getElementById('chat').addEventListener('scroll', function() {
  if (!has_more || loading_more || this.scrollTop > 80) return;
